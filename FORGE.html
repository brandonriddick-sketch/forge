<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="theme-color" content="#0a0a0a">
<title>FORGE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;color:#f0ece4;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;overscroll-behavior:none}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Header */
#header{background:linear-gradient(135deg,#0a0a0a,#1a0a00);border-bottom:1px solid #222;padding:10px 18px;padding-top:calc(10px + env(safe-area-inset-top));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#logo{font-family:'Impact','Arial Narrow',sans-serif;font-size:1.7rem;letter-spacing:4px;color:#ff4d1c;text-shadow:0 0 20px rgba(255,77,28,.5)}
#save-badge{font-size:10px;color:#4caf78;font-family:'Courier New',monospace;display:flex;align-items:center;gap:5px}
#save-dot{width:6px;height:6px;border-radius:50%;background:#4caf78;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* Day tabs */
#day-tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:7px 11px;border-radius:10px;border:1px solid #222;background:#111;cursor:pointer;min-width:54px;text-align:center;transition:all .15s}
.day-tab.active{border-color:#ff4d1c;background:rgba(255,77,28,.12)}
.day-tab.done-day{border-color:rgba(76,207,120,.3);background:rgba(76,207,120,.05)}
.day-tab.complete{border-color:rgba(76,207,120,.4);background:rgba(76,207,120,.08)}
.tab-label{font-size:9px;font-family:'Courier New',monospace;letter-spacing:1px;color:#5a5550}
.day-tab.active .tab-label{color:#ff4d1c}
.day-tab.done-day .tab-label,.day-tab.complete .tab-label{color:#4caf78}

.tab-date{font-size:8px;color:#3a3a3a;font-family:"Courier New",monospace;margin-top:1px}
.day-tab.active .tab-date{color:#ff4d1c;opacity:.7}
.day-tab.done-day .tab-date,.day-tab.complete .tab-date{color:#4caf78;opacity:.6}

.tab-title{font-size:9px;color:#5a5550;margin-top:2px;line-height:1.3}
.day-tab.active .tab-title{color:#ff8c42}
.day-tab.done-day .tab-title,.day-tab.complete .tab-title{color:#4caf78}

/* Scroll */
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px 80px;overscroll-behavior:contain}

/* Workout header */
.wk-header{border-radius:14px;padding:14px 16px;margin:10px 0 8px;border:1px solid rgba(255,255,255,.06)}
.wk-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:1.4rem;letter-spacing:3px}
.wk-sub{font-size:11px;color:#8a8480;margin:3px 0 5px;font-family:'Courier New',monospace}
.wk-tip{font-size:11px;color:#8a8480;line-height:1.6}
.done-banner{margin-top:10px;padding:8px 14px;background:rgba(76,207,120,.1);border:1px solid rgba(76,207,120,.3);border-radius:8px;color:#4caf78;font-size:12px;font-weight:600;text-align:center}

/* Exercise card */
.ex-card{background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:12px 13px;margin-bottom:8px;transition:border-color .2s}
.ex-card.ex-done{border-color:rgba(76,207,120,.25);background:rgba(76,207,120,.02)}
.ex-row{display:flex;align-items:flex-start;gap:9px}
.ex-num{width:24px;height:24px;border-radius:50%;background:#1a1a1a;border:1px solid #252525;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Courier New',monospace;color:#5a5550;flex-shrink:0;margin-top:2px}
.ex-body{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:13px;margin-bottom:2px}
.ex-card.ex-done .ex-name{color:#4caf78}
.ex-type-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:8px;margin-left:6px;vertical-align:middle;font-family:'Courier New',monospace}
.ex-machine{font-size:10px;color:#5a5550;margin-bottom:2px}
.ex-muscles{font-size:10px;color:#ff8c42;font-family:'Courier New',monospace;margin-bottom:4px;font-weight:500}
.ex-detail{font-size:12px;color:#f0ece4;font-family:'Courier New',monospace;margin-bottom:7px;font-weight:500}
.ex-cue{font-size:11px;color:#c0bab4;background:rgba(255,77,28,.06);border-left:2px solid #ff4d1c;border-radius:0 6px 6px 0;padding:6px 10px;margin-bottom:8px;line-height:1.5}
.set-bubbles{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.set-btn{width:36px;height:36px;border-radius:50%;border:2px solid #2a2a2a;background:#1a1a1a;color:#5a5550;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace}
.set-btn.set-done{border-color:#4caf78;background:rgba(76,207,120,.15);color:#4caf78}
.sets-label{font-size:10px;color:#5a5550;font-family:'Courier New',monospace}
.ex-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

.watch-btn{font-size:11px;padding:6px 12px;border-radius:7px;border:1px solid rgba(255,77,28,.35);background:rgba(255,77,28,.1);color:#ff6b3d;cursor:pointer;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:5px;line-height:1}
.watch-btn:active{background:rgba(255,77,28,.2)}

.guide-btn{font-size:11px;padding:6px 13px;border-radius:7px;border:1px solid rgba(255,140,66,.4);background:rgba(255,140,66,.1);color:#ff8c42;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-weight:600;letter-spacing:.3px}
.rest-label{font-size:10px;color:#5a5550;font-family:'Courier New',monospace}
.mark-done-btn{flex-shrink:0;padding:7px 12px;border-radius:8px;border:1px solid #282828;background:#1a1a1a;color:#5a5550;cursor:pointer;font-size:11px;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;white-space:nowrap;transition:all .15s;line-height:1.4;text-align:center}
.mark-done-btn.is-done{border-color:rgba(76,207,120,.4);background:rgba(76,207,120,.1);color:#4caf78}

/* ── GUIDE MODAL ── */
#guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#guide-overlay.open{display:flex}
#guide-modal{background:#111;border:1px solid #252525;border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:88vh;max-height:88dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
#guide-handle{width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:12px auto 0}
#guide-header{padding:12px 18px 10px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
#guide-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:1.3rem;letter-spacing:2px;color:#ff8c42}
#guide-subtitle{font-size:11px;color:#5a5550;font-family:'Courier New',monospace;margin-top:2px}
#guide-close{position:absolute;top:14px;right:16px;background:none;border:1px solid #2a2a2a;color:#5a5550;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#guide-header{position:relative}
#guide-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}

/* Guide sections */
.guide-section{padding:14px 18px;border-bottom:1px solid #1a1a1a}
.guide-section:last-child{border-bottom:none}
.section-label{font-size:9px;font-family:'Courier New',monospace;letter-spacing:2px;color:#5a5550;text-transform:uppercase;margin-bottom:10px}

/* Equipment diagram */
#guide-diagram{display:flex;justify-content:center;padding:10px 0 4px;background:#0d0d0d}
#guide-diagram svg{max-width:100%;height:auto}

/* Muscle chips */
.muscle-chips{display:flex;flex-wrap:wrap;gap:6px}
.muscle-chip{padding:4px 10px;border-radius:20px;font-size:10px;font-family:'Courier New',monospace}
.muscle-chip.primary{background:rgba(255,77,28,.15);border:1px solid rgba(255,77,28,.4);color:#ff8c42}
.muscle-chip.secondary{background:rgba(76,154,245,.1);border:1px solid rgba(76,154,245,.3);color:#4c9af5}
.muscle-chip.stabilizer{background:rgba(255,255,255,.05);border:1px solid #2a2a2a;color:#5a5550}

/* Setup steps */
.setup-steps{display:flex;flex-direction:column;gap:6px}
.setup-step{display:flex;gap:10px;align-items:flex-start}
.step-num{width:20px;height:20px;border-radius:50%;background:rgba(255,140,66,.15);border:1px solid rgba(255,140,66,.35);color:#ff8c42;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:'Courier New',monospace}
.step-text{font-size:12px;color:#c0bab4;line-height:1.5}
.step-text strong{color:#f0ece4}

/* Form cues */
.cue-list{display:flex;flex-direction:column;gap:5px}
.cue-item{display:flex;gap:8px;align-items:flex-start;padding:7px 10px;background:#0d0d0d;border-radius:8px;border-left:2px solid #ff4d1c}
.cue-icon{font-size:13px;flex-shrink:0}
.cue-text{font-size:11px;color:#c0bab4;line-height:1.5}
.cue-text strong{color:#f0ece4}

/* Common mistakes */
.mistake-item{display:flex;gap:8px;align-items:flex-start;padding:7px 10px;background:#0d0d0d;border-radius:8px;border-left:2px solid #3a3a3a}
.mistake-text{font-size:11px;color:#8a8480;line-height:1.5}
.mistake-text strong{color:#ff4d1c}

/* Rest timer */
#rest-timer{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1a0a00;border:1px solid rgba(255,77,28,.5);border-radius:16px;padding:12px 22px;z-index:400;display:none;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.7);white-space:nowrap}
#rest-timer.on{display:flex}
#timer-secs{font-family:'Impact','Arial Narrow',sans-serif;font-size:2rem;color:#ff4d1c;min-width:48px;text-align:center}
.timer-label{font-size:10px;color:#ff8c42;text-transform:uppercase;letter-spacing:2px}
#timer-dismiss{background:none;border:1px solid #333;border-radius:8px;color:#5a5550;padding:4px 10px;cursor:pointer;font-size:12px}


/* Stats page */
.stats-page{padding:12px 0 20px}
.stats-section{margin-bottom:14px}
.stats-heading{font-family:'Impact','Arial Narrow',sans-serif;font-size:1rem;letter-spacing:3px;color:#ff4d1c;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #1e1e1e}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:11px 13px}
.stat-val{font-family:'Impact','Arial Narrow',sans-serif;font-size:1.6rem;letter-spacing:1px;line-height:1}
.stat-label{font-size:10px;color:#5a5550;font-family:'Courier New',monospace;margin-top:3px}
.stat-sub{font-size:10px;color:#8a8480;margin-top:2px}
.stat-card.highlight{border-color:rgba(255,77,28,.3);background:rgba(255,77,28,.06)}
.stat-card.highlight .stat-val{color:#ff4d1c}
.stat-card.green{border-color:rgba(76,207,120,.3);background:rgba(76,207,120,.04)}
.stat-card.green .stat-val{color:#4caf78}
.stat-card.blue{border-color:rgba(76,154,245,.3);background:rgba(76,154,245,.04)}
.stat-card.blue .stat-val{color:#4c9af5}
.progress-bar-wrap{background:#1a1a1a;border-radius:8px;height:10px;margin-top:6px;overflow:hidden}
.progress-bar{height:10px;border-radius:8px;transition:width .6s ease}
.macro-row{display:flex;gap:7px;margin-bottom:7px}
.macro-card{flex:1;background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:10px 12px;text-align:center}
.macro-val{font-family:'Impact','Arial Narrow',sans-serif;font-size:1.3rem;letter-spacing:1px}
.macro-label{font-size:9px;color:#5a5550;font-family:'Courier New',monospace}
.protocol-row{background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:center}
.protocol-icon{font-size:16px;flex-shrink:0}
.protocol-text{font-size:11px;color:#c0bab4;line-height:1.4}
.protocol-text strong{color:#f0ece4}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.week-day{background:#141414;border:1px solid #1e1e1e;border-radius:7px;padding:6px 4px;text-align:center}
.week-day.wd-done{border-color:rgba(76,207,120,.3);background:rgba(76,207,120,.06)}
.week-day.wd-today{border-color:rgba(255,77,28,.4);background:rgba(255,77,28,.08)}
.wd-label{font-size:9px;font-family:'Courier New',monospace;color:#5a5550}
.week-day.wd-done .wd-label,.week-day.wd-today .wd-label{color:#f0ece4}
.stats-tab .tab-label{color:#ff8c42!important}
.stats-tab.active{border-color:#ff8c42;background:rgba(255,140,66,.12)}
.wd-icon{font-size:12px;margin-top:2px}

.cardio-placeholder{text-align:center;padding:50px 20px;color:#5a5550;line-height:2.2;font-size:13px}

/* Weight logging */
.weight-log-wrap{margin-top:8px;padding-top:8px;border-top:1px solid #1e1e1e}
.weight-log-label{font-size:9px;font-family:"Courier New",monospace;letter-spacing:2px;color:#5a5550;text-transform:uppercase;margin-bottom:6px}
.weight-inputs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.weight-input-group{display:flex;flex-direction:column;align-items:center;gap:3px}
.weight-input-label{font-size:8px;color:#5a5550;font-family:"Courier New",monospace}
.weight-input{width:58px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;color:#f0ece4;font-size:13px;font-family:"Courier New",monospace;padding:5px 6px;text-align:center;-webkit-appearance:none}
.weight-input:focus{outline:none;border-color:#ff4d1c}
.weight-save-btn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,77,28,.4);background:rgba(255,77,28,.1);color:#ff4d1c;font-size:11px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;white-space:nowrap;align-self:flex-end;margin-bottom:1px}
.weight-save-btn.saved{border-color:rgba(76,207,120,.4);background:rgba(76,207,120,.1);color:#4caf78}
.prev-weight-row{display:flex;align-items:center;gap:8px;margin-top:6px;padding:5px 8px;background:#0d0d0d;border-radius:6px;border-left:2px solid #ff4d1c}
.prev-weight-label{font-size:9px;color:#5a5550;font-family:"Courier New",monospace}
.prev-weight-val{font-size:11px;color:#ff8c42;font-family:"Courier New",monospace;font-weight:600}
.prev-weight-date{font-size:9px;color:#3a3a3a;font-family:"Courier New",monospace;margin-left:auto}
.target-weight{font-size:9px;color:#4caf78;font-family:"Courier New",monospace;margin-left:4px}

</style>
</head>

<div id="app">
  <div id="header">
    <div id="logo">FORGE //</div>
    <div id="save-badge"><div id="save-dot"></div><span>SAVED</span></div>

<!-- Guide Modal -->
<div id="guide-overlay" onclick="closeGuide(event)">

<!-- Rest Timer -->
<div id="rest-timer">

  <button id="timer-dismiss" onclick="stopTimer()">✕ Skip</button>
</div>

const WK_LOG_KEY = "forge_weights_v1";
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyE_HP8BycU57w07VZ-qsNoLJI22Jh4H_jK9RIaN-ytCWpDe_-VEy7xwQN6d_gaCm3FuA/exec";

// Local cache for fast reads
function loadWeights() {
  try { return JSON.parse(localStorage.getItem(WK_LOG_KEY) || "{}"); } catch { return {}; }
}
function saveWeightsLocal(w) {
  try { localStorage.setItem(WK_LOG_KEY, JSON.stringify(w)); } catch {}
}

// Save to Google Sheet
async function saveToSheet(dayKey, exName, sets) {
  var today = new Date().toISOString().slice(0,10);
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        date: today,
        day: dayKey,
        exercise: exName,
        sets: sets
      })
    });
    return true;
  } catch(err) {
    console.log("Sheet save failed:", err);
    return false;
  }
}

// Load all weights from Google Sheet and merge with local
async function loadFromSheet() {
  try {
    var resp = await fetch(SHEETS_URL + "?t=" + Date.now());
    var json = await resp.json();
    if(!json.success || !json.data) return;
    var weights = loadWeights();
    json.data.forEach(function(row) {
      if(!row.Exercise || !row.Date) return;
      var wk = weightKey(row.Day || "UNK", row.Exercise);
      if(!weights[wk]) weights[wk] = [];
      var sets = [row["Set 1"],row["Set 2"],row["Set 3"],row["Set 4"],row["Set 5"]].filter(function(v,i,a){
        return i < 5;
      }).map(function(v){ return v ? String(v) : ""; });
      // Check if date already exists
      var exists = weights[wk].findIndex(function(s){ return s.date === row.Date; });
      var entry = {date: row.Date, sets: sets, day: row.Day};
      if(exists >= 0) weights[wk][exists] = entry;
      else weights[wk].push(entry);
    });
    // Sort each exercise by date
    Object.keys(weights).forEach(function(k){
      weights[k].sort(function(a,b){ return a.date > b.date ? 1 : -1; });
      if(weights[k].length > 20) weights[k] = weights[k].slice(-20);
    });
    saveWeightsLocal(weights);
    return weights;
  } catch(err) {
    console.log("Sheet load failed:", err);
    return null;
  }
}

function weightKey(dayKey, exName) {
  return dayKey + ":" + exName.replace(/[^a-zA-Z0-9]/g, "_");
}

function getWeightLogHTML(dayKey, ex, exIdx) {
  if(ex.type === "cardio" || ex.type === "bodyweight") return "";
  
  var weights = loadWeights();
  var wk = weightKey(dayKey, ex.name);
  var sessions = weights[wk] || [];
  var lastSession = sessions.length > 0 ? sessions[sessions.length-1] : null;
  var prevSession = sessions.length > 1 ? sessions[sessions.length-2] : null;
  
  // Build set inputs
  var setInputs = "";
  for(var s=0; s<ex.sets; s++) {
    var lastVal = lastSession ? (lastSession.sets[s] || "") : "";
    var target5pct = lastVal ? Math.ceil(parseFloat(lastVal) * 1.05 / 2.5) * 2.5 : "";
    setInputs += '<div class="weight-input-group">' +
      '<div class="weight-input-label">SET '+(s+1)+'</div>' +
      '<input class="weight-input" type="number" id="w_'+dayKey+'_'+exIdx+'_'+s+'" ' +
      'placeholder="'+(lastVal||"lb")+'" min="0" max="999" step="2.5">' +
      '</div>';
  }
  
  var prevRow = "";
  if(lastSession) {
    var targetVals = lastSession.sets.map(function(v) {
      return v ? Math.ceil(parseFloat(v)*1.05/2.5)*2.5+"lb" : "?";
    }).join(" / ");
    var lastVals = lastSession.sets.map(function(v){ return v ? v+"lb" : "—"; }).join(" / ");
    prevRow = '<div class="prev-weight-row">' +
      '<div>' +
        '<div class="prev-weight-label">LAST SESSION</div>' +
        '<div class="prev-weight-val">'+lastVals+'</div>' +
      '</div>' +
      '<div>' +
        '<div class="prev-weight-label">+5% TARGET</div>' +
        '<div class="target-weight">'+targetVals+'</div>' +
      '</div>' +
      '<div class="prev-weight-date">'+lastSession.date+'</div>' +
    '</div>';
  }

  return '<div class="weight-log-label">⚖️ Log Weights</div>' +
    '<div class="weight-inputs">' + setInputs +
    '<button class="weight-save-btn" id="wsave_'+dayKey+'_'+exIdx+'" ' +
    'data-day="'+dayKey+'" data-ex="'+exIdx+'" data-sets="'+ex.sets+'" data-name="'+ex.name.replace(/"/g,"&quot;")+"'" +
    'onclick="saveWeightLog(this)">Save</button>' +
    '</div>' + prevRow;
}

async function saveWeightLog(btn) {
  var dayKey = btn.getAttribute("data-day");
  var exIdx = btn.getAttribute("data-ex");
  var numSets = parseInt(btn.getAttribute("data-sets"));
  var exName = btn.getAttribute("data-name");
  var sets = [];
  for(var s=0; s<numSets; s++) {
    var input = document.getElementById("w_"+dayKey+"_"+exIdx+"_"+s);
    sets.push(input ? (input.value || "") : "");
  }
  if(sets.every(function(v){ return !v; })) {
    btn.textContent = "Enter weights first";
    setTimeout(function(){ btn.textContent = "Save"; }, 2000);
    return;
  }
  btn.textContent = "Saving...";
  btn.disabled = true;

  // Save to local cache immediately
  var weights = loadWeights();
  var wk = weightKey(dayKey, exName);
  if(!weights[wk]) weights[wk] = [];
  var today = new Date().toISOString().slice(0,10);
  var existing = -1;
  for(var i=0;i<weights[wk].length;i++){ if(weights[wk][i].date===today){ existing=i; break; } }
  var entry = {date: today, sets: sets, day: dayKey};
  if(existing >= 0) weights[wk][existing] = entry;
  else weights[wk].push(entry);
  if(weights[wk].length > 20) weights[wk] = weights[wk].slice(-20);
  saveWeightsLocal(weights);

  // Save to Google Sheet
  var sheetOk = await saveToSheet(dayKey, exName, sets);

  btn.textContent = sheetOk ? "✓ Saved to Sheet" : "✓ Saved Locally";
  btn.className = "weight-save-btn saved";
  btn.disabled = false;
  setTimeout(function(){ render(); }, 1500);
}

"Bicycle Crunches": {
  muscles:[{n:"Obliques",t:"primary"},{n:"Rectus Abdominis",t:"primary"},{n:"Hip Flexors",t:"secondary"}],
  setup:[
    {t:"<strong>Lie flat on mat</strong>, lower back pressed INTO the floor — not arched. This is non-negotiable."},
    {t:"<strong>Hands lightly behind head</strong>, elbows wide. Fingers interlaced behind neck — but DON'T pull your neck."},
    {t:"<strong>Legs up</strong>, shins parallel to the floor. Both knees bent at 90° to start."},
    {t:"<strong>Shoulder blades off the mat</strong> before you begin — stay crunched up throughout the set."},

  cues:[

    {i:"🦵",t:"<strong>Extend the opposite leg fully</strong> as you rotate — lower it toward the floor but don't touch."},
    {i:"🐌",t:"<strong>SLOW. 2 seconds per side.</strong> Bicycle crunches done fast are hip flexor raises. Done slow they torch obliques."},
    {i:"📌",t:"<strong>Lower back stays pressed to mat</strong> throughout — if it arches, legs are too low."},
    {i:"🚫",t:"<strong>Don't pull your neck.</strong> Hands support the head weight only. The work comes from the core, not the neck."},

    {t:"<strong>Elbow to knee (not shoulder):</strong> Makes you hunch instead of rotate. SHOULDER drives toward KNEE."},
    {t:"<strong>Arching lower back:</strong> Lower back must stay pressed to the mat the entire time."},

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getTodayOffset(dayDow, todayDow) {
  if(dayDow === -1) return "";
  var diff = dayDow - todayDow;
  var d = new Date();
  d.setDate(d.getDate() + diff);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate();
}

function renderTabs(){
  const c=document.getElementById("day-tabs"); c.innerHTML="";
  // Map each day key to its day-of-week index (0=Sun)
  const DOW={SUN:0,MON:1,TUE:2,WED:3,THU:4,FRI:5,SAT:6,STATS:-1};
  const todayDow=new Date().getDay();
  DAYS.forEach(d=>{
    const hasData=!!WK[d.key];
    const isActive=ACTIVE===d.key;
    const complete=hasData&&WK[d.key].exercises.length>0&&WK[d.key].exercises.every((_,i)=>!!LOG[doneKey(d.key,i)]);
    // A day is "done" if it's earlier in the week than today (or is SUN/MON which are always done)
    const dayDow=DOW[d.key];
    const isPast=dayDow!==undefined&&dayDow<todayDow;
    const isToday=dayDow===todayDow;
    const tab=document.createElement("div");
    tab.className="day-tab"+(isActive?" active":"")+(isPast||complete?" done-day":"")+(d.key==="STATS"?" stats-tab":"");
    var tabDate = getTodayOffset(dayDow, todayDow);
    tab.innerHTML=`<div class="tab-label">${d.label}${isToday?" ←":""}</div><div class="tab-date">${tabDate}</div><div class="tab-title">${isPast||complete?"✓ ":""}${d.title}</div>`;
    // Every day is clickable
    tab.onclick=()=>{ACTIVE=d.key;render();};
    tab.style.cursor="pointer";
    tab.style.opacity=isPast&&!isActive?"0.6":"1";
    c.appendChild(tab);
  });
}

  div.id=`ex-${idx}`;
  const q=QUICK[ex.name];
  let bubbles="";
  if(ex.sets>1){
    for(let s=0;s<ex.sets;s++){
      const sd=!!LOG[setKey(dayKey,idx,s)];
      bubbles+=`<button class="set-btn${sd?" set-done":""}" onclick="toggleSet(${idx},${s},${ex.rest})">${sd?"✓":s+1}</button>`;
    }
    bubbles=`<div class="set-bubbles">${bubbles}<span class="sets-label">${completed}/${ex.sets}</span></div>`;
  }
  const hasGuide=!!GUIDES[ex.name];
  div.innerHTML=`
    <div class="ex-row">
      <div class="ex-num">${idx+1}</div>
      <div class="ex-body">
        <div class="ex-name">${ex.name}<span class="ex-type-badge" style="background:${tc}18;border:1px solid ${tc}44;color:${tc}">${TL[ex.type]||ex.type}</span></div>
        <div class="ex-machine">📍 ${ex.machine}</div>
        ${q?`<div class="ex-muscles">🎯 ${q.muscles}</div>`:""}
        <div class="ex-detail">${ex.detail}</div>
        ${bubbles}
        ${q?`<div class="ex-cue">${q.cue}</div>`:""}
        <div class="ex-actions">
          <button class="guide-btn" onclick="openGuide('${ex.name.replace(/'/g,"\\'")}')">
            ${hasGuide?"📋 Full Guide · Setup · Form":"📋 Guide"}
          </button>
          ${YT_LINKS[ex.name]?`<a class="watch-btn" href="${YT_LINKS[ex.name]}" target="_blank" rel="noopener">▶ Watch</a>`:""}
          ${ex.rest>0?`<span class="rest-label">Rest: ${ex.rest}s</span>`:""}
        </div>
        <div class="weight-log-wrap">
          ${getWeightLogHTML(dayKey, ex, idx)}
        </div>
      </div>
      <button class="mark-done-btn${done?" is-done":""}" onclick="toggleDone(${idx})">${done?"✓\nDone":"Mark\nDone"}</button>
    </div>`;
  return div;
}

function render(){
  renderTabs();
  const content=document.getElementById("wk-content"); content.innerHTML="";
  if(ACTIVE==="STATS"){renderTabs();renderStats();return;}
  const wk=WK[ACTIVE];
  if(!wk){
    content.innerHTML='<div class="cardio-placeholder">Select a workout above.</div>';
    return;
  }
  // Cardio days have no exercises — show Zone 2 card
  if(wk.exercises.length===0){
    var hdrC=document.createElement("div");
    hdrC.className="wk-header";
    hdrC.style.background="linear-gradient(135deg,"+wk.color+"10,transparent)";
    hdrC.style.borderColor=wk.color+"28";
    hdrC.innerHTML='<div class="wk-title" style="color:'+wk.color+'">'+ wk.title +'</div>'+
      '<div class="wk-sub">'+ wk.label +' · Zone 2 Steady State</div>'+
      '<div class="wk-tip">'+ wk.tip +'</div>'+
      '<div style="background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:16px 18px;margin-top:10px">'+
      '<div style="font-size:12px;color:#8a8480;line-height:2">'+
      '<span style="color:#4c9af5;font-family:monospace">0–5 min</span> — Easy walk 3.0 mph / 1% incline<br>'+
      '<span style="color:#4caf78;font-family:monospace">5–30 min</span> — Steady 4–5 mph / 2% incline (HR 120–140 BPM)<br>'+
      '<span style="color:#ff8c42;font-family:monospace">30–38 min</span> — Power walk 3.5 mph / 8% incline<br>'+
      '<span style="color:#5a5550;font-family:monospace">38–40 min</span> — Cool down 2.5 mph / 0%'+
      '</div>'+
      '<div style="margin-top:10px;font-size:11px;color:#5a5550">No handrails · Eyes forward · Arms swinging · Stay aerobic</div>'+
      '</div>';
    document.getElementById("wk-content").appendChild(hdrC);
    return;
  }
  const dayDone=wk.exercises.every((_,i)=>!!LOG[doneKey(ACTIVE,i)]);
  const hdr=document.createElement("div");
  hdr.className="wk-header";
  hdr.style.background=`linear-gradient(135deg,${wk.color}10,transparent)`;
  hdr.style.borderColor=wk.color+"28";
  hdr.innerHTML=`<div class="wk-title" style="color:${wk.color}">${wk.title}</div><div class="wk-sub">${wk.label} · ${wk.exercises.length} exercises</div><div class="wk-tip">${wk.tip}</div>${dayDone?`<div class="done-banner">🏆 WORKOUT COMPLETE — BEAST MODE ACTIVATED</div>`:""}`;
  content.appendChild(hdr);
  wk.exercises.forEach((ex,i)=>content.appendChild(renderCard(ACTIVE,ex,i)));
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleSet(exIdx,setIdx,rest){
  const k=setKey(ACTIVE,exIdx,setIdx);
  const dk=doneKey(ACTIVE,exIdx);
  const ex=WK[ACTIVE].exercises[exIdx];
  LOG[k]=!LOG[k];
  if(LOG[k]&&ex.sets>1){
    const allDone=Array.from({length:ex.sets},(_,s)=>!!LOG[setKey(ACTIVE,exIdx,s)]).every(Boolean);
    if(allDone) LOG[dk]=true;
    if(rest>0) startTimer(rest);
  }
  saveLog(LOG); render();
  setTimeout(()=>{const el=document.getElementById(`ex-${exIdx}`);if(el)el.scrollIntoView({block:"nearest"})},50);
}
function toggleDone(exIdx){
  const k=doneKey(ACTIVE,exIdx);
  LOG[k]=!LOG[k]; saveLog(LOG); render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async function(){
  const dayMap={0:"SUN",1:"MON",2:"TUE",3:"WED",4:"THU",5:"FRI",6:"SAT"};
  const today=dayMap[new Date().getDay()];
  if(WK[today]) ACTIVE=today;
  render(); // render immediately with local data
  await loadFromSheet(); // then sync from sheet in background
  render(); // re-render with sheet data
  // Service worker skipped in local file mode
})();
</script>
